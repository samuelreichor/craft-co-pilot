# Tool Selection Tests — Verify the AI picks the correct tool for each intent.

- vars:
    message: "Zeig mir Eintrag 92"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        calls.length === 1 && calls[0].function.name === 'readEntry'
        && JSON.parse(calls[0].function.arguments).entryId === 92;
    - type: llm-rubric
      value: "The model calls readEntry with entryId 92. No other tool is called."

- vars:
    message: "Finde Artikel über Protein"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        calls.length === 1 && calls[0].function.name === 'searchEntries'
        && JSON.parse(calls[0].function.arguments).query !== undefined;
    - type: llm-rubric
      value: "The model calls searchEntries with a search query related to 'Protein'."

- vars:
    message: "Ändere den Titel auf 'Neuer Titel' und das Excerpt auf 'Kurzbeschreibung'"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        calls.length === 1 && calls[0].function.name === 'updateEntry';
    - type: llm-rubric
      value: "The model calls updateEntry (batch) instead of multiple updateField calls."

- vars:
    message: "Setze ein neues Hero-Bild für Eintrag 42"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        calls[0].function.name === 'searchAssets';
    - type: llm-rubric
      value: "The model calls searchAssets first before setting an image field."

- vars:
    message: "Erstelle einen neuen Blog-Artikel vom Typ 'article'"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        calls.some(c => c.function.name === 'createEntry');
    - type: llm-rubric
      value: "The model calls createEntry with section 'blog' and type 'article'."

- vars:
    message: "Ändere den Text in Block 302"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        calls.some(c => {
          if (c.function.name !== 'updateField') return false;
          const args = JSON.parse(c.function.arguments);
          return args.entryId === 302;
        });
    - type: llm-rubric
      value: "The model calls updateField with entryId 302 to target the specific matrix block."
