# Field Format Tests — Verify the AI uses correct value formats for each field type.

- vars:
    message: "Setze das Hero-Bild von Eintrag 42 auf Asset 205"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        const call = calls.find(c => c.function.name === 'updateField' || c.function.name === 'updateEntry');
        if (!call) return false;
        const args = JSON.parse(call.function.arguments);
        const value = args.value || (args.fields && Object.values(args.fields).find(v => Array.isArray(v)));
        return Array.isArray(value) && value.includes(205);
    - type: llm-rubric
      value: "Asset field values are set as an array of integer IDs, e.g. [205]."

- vars:
    message: "Setze die Farbe von Eintrag 42 auf Blau"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        const call = calls.find(c => c.function.name === 'updateField' || c.function.name === 'updateEntry');
        if (!call) return false;
        const args = JSON.parse(call.function.arguments);
        const value = args.value || (args.fields && Object.values(args.fields).find(v => typeof v === 'string' && v.startsWith('#')));
        return typeof value === 'string' && /^#[0-9a-fA-F]{6}$/.test(value);
    - type: llm-rubric
      value: "Color field values are hex strings like '#0000ff'."

- vars:
    message: "Setze das Datum von Eintrag 42 auf den 1. März 2025"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        const call = calls.find(c => c.function.name === 'updateField' || c.function.name === 'updateEntry');
        if (!call) return false;
        const args = JSON.parse(call.function.arguments);
        const value = args.value || (args.fields && Object.values(args.fields).find(v => typeof v === 'string' && v.includes('2025')));
        return typeof value === 'string' && value.startsWith('2025-03-01');
    - type: llm-rubric
      value: "Date field values are ISO 8601 strings like '2025-03-01'."

- vars:
    message: "Setze die Tags von Eintrag 42 auf Tag 10 und Tag 15"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        const call = calls.find(c => c.function.name === 'updateField' || c.function.name === 'updateEntry');
        if (!call) return false;
        const args = JSON.parse(call.function.arguments);
        const value = args.value || (args.fields && Object.values(args.fields).find(v => Array.isArray(v)));
        return Array.isArray(value) && value.every(v => Number.isInteger(v));
    - type: llm-rubric
      value: "Tag field values are arrays of integer IDs like [10, 15]."

- vars:
    message: "Füge einen neuen Text-Block zum Matrix-Feld 'contentBlocks' von Eintrag 42 hinzu mit dem Inhalt 'Hallo Welt'"
  assert:
    - type: is-valid-openai-tools-call
    - type: javascript
      value: |
        const calls = JSON.parse(output);
        const call = calls.find(c => c.function.name === 'updateField' || c.function.name === 'updateEntry');
        if (!call) return false;
        const args = JSON.parse(call.function.arguments);
        const value = args.value || (args.fields && Object.values(args.fields).find(v => Array.isArray(v) && v[0] && v[0].type));
        return Array.isArray(value) && value[0] && typeof value[0].type === 'string' && value[0].fields;
    - type: llm-rubric
      value: "Matrix field values are arrays of block objects with 'type' and 'fields' keys."
